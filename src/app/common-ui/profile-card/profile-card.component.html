@if (profile) {
  <div class="profile-card">
    <div class="profile-card__main">
      <div class="profile-card__identity">
      <img [src]="profile.avatarUrl | imageUrl" alt="avatar" class="profile-card__avatar">
      <div class="profile-card__name">
          <strong class="profile-card__full-name">{{ profile.firstName }} {{ profile.lastName }}</strong>
          <span class="profile-card__username">{{ profile.username }}</span>
        </div>
      </div>

      <p class="profile-card__description">{{ profile.description }}</p>

      <div class="profile-card__tags">
        @for (skill of getSkills(profile); track $index; let skillIndex = $index) {
          <span class="profile-card__tag" [class.profile-card__tag--accent]="skillIndex < 2">{{ skill }}</span>
        }
      </div>
    </div>

    <div class="profile-card__actions">
      @if (showInvite) {
        <button type="button" class="icon-btn icon-btn--accent" aria-label="Добавить в контакты">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M10 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h11.4a5.5 5.5 0 0 1 4.72-8.28A8.86 8.86 0 0 0 10 13Zm9 2h-2v-2h-2v2h-2v2h2v2h2v-2h2Z"/>
          </svg>
        </button>
      }

      <button type="button" class="primary-btn">
        <span>{{ primaryActionLabel }}</span>
        @if (actionType === 'message') {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M13 5.83 19.17 12 13 18.17V13H5v-2h8V5.83Z"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M15 8a3 3 0 1 1-3-3 3 3 0 0 1 3 3Zm-3 4c-2.67 0-8 1.34-8 4v1h10.74A6 6 0 0 1 18 11.35a8.58 8.58 0 0 0-6-.35Zm8-1h-2V9h-2v2h-2v2h2v2h2v-2h2Z"/>
          </svg>
        }
      </button>

      <button type="button" class="icon-btn icon-btn--primary" aria-label="Перейти в профиль">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M13 5.83 19.17 12 13 18.17V13H5v-2h8V5.83Z"/>
        </svg>
      </button>
    </div>
  </div>
}
