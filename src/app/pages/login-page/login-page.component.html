<div class="login-page">
  <div class="login-page__bg-main"></div>
  <div class="login-page__bg-tiles"></div>

  <div class="login-content">
    <section class="login-panel">
      <h1 class="login-panel__title">Вход</h1>

      <form class="login-form">
        <div class="login-form__fields">
          <label class="login-field login-field--primary">
            <span class="login-field__label">Telegram username</span>
            <div class="login-field__box">
              <input type="text" class="login-field__control" placeholder="Введите логин" autocomplete="username">
              <span class="login-field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="8" fill="currentColor"></circle>
                  <path d="M9.5 12.4L15.5 9.6L13 15.8L11.7 13.5L9.5 12.4Z" fill="#000000"></path>
                </svg>
              </span>
            </div>
          </label>

          <label class="login-field">
            <span class="login-field__label">Пароль</span>
            <div class="login-field__box">
              <input type="password" class="login-field__control" placeholder="Введите пароль" autocomplete="current-password">
              <span class="login-field__icon login-field__icon--muted" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M3 6.5L4.5 5L20 19.5L18.5 21L15.7 18.2C14.6 18.7 13.3 19 12 19C7.2 19 3.1 16.2 1 12C2 9.9 3.5 8.1 5.4 6.8L3 6.5ZM12 7C16.8 7 20.9 9.8 23 14C22.3 15.5 21.3 16.8 20.1 17.8L17.8 15.5C18.3 15 18.7 14.5 19 14C17.3 10.9 14.8 9 12 9C11.3 9 10.6 9.1 10 9.3L8.3 7.6C9.4 7.2 10.7 7 12 7Z" fill="currentColor"></path>
                </svg>
              </span>
            </div>
          </label>
        </div>

        <button type="submit" class="login-submit">Войти</button>
      </form>
    </section>

    <section class="login-art" aria-hidden="true">
      <img src="/assets/img/login-illustration.svg" alt="">
    </section>
  </div>
</div>
